<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'; object-src 'none'; base-uri 'none'" />
<title>2FA Codes</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --glass-bg: rgba(255, 255, 255, 0.72);
  --glass-bg-strong: rgba(255, 255, 255, 0.84);
  --glass-bg-soft: rgba(255, 255, 255, 0.42);
  --glass-border: rgba(255, 255, 255, 0.68);
  --glass-border-subtle: rgba(148, 163, 184, 0.18);
  --glass-highlight: inset 0 1px 0 rgba(255, 255, 255, 0.72);
  --glass-shadow: 0 18px 46px rgba(31, 41, 55, 0.12), 0 3px 12px rgba(31, 41, 55, 0.06);
  --text-primary: #1f2937;
  --text-secondary: #64748b;
  --primary: #1677ff;
  --success: #22c55e;
  --warning: #f59e0b;
  --danger: #ef4444;
}

html, body {
  height: 100%;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  background: transparent;
  color: var(--text-primary);
  user-select: none;
}

.popup {
  height: 100%;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-radius: 8px;
  background:
    linear-gradient(145deg, rgba(238,245,255,0.58), rgba(255,247,239,0.42)),
    var(--glass-bg);
  backdrop-filter: blur(18px) saturate(145%);
  -webkit-backdrop-filter: blur(18px) saturate(145%);
  border: 1px solid var(--glass-border);
  box-shadow: var(--glass-shadow), var(--glass-highlight);
}

.items {
  flex: 1;
  overflow-y: auto;
}
.items::-webkit-scrollbar { width: 4px; }
.items::-webkit-scrollbar-thumb { background: rgba(100,116,139,0.25); border-radius: 2px; }

.item {
  padding: 12px 16px;
  background: rgba(255,255,255,0.18);
  transition: background 0.15s;
}

.item:hover {
  background: rgba(255,255,255,0.36);
}

.item + .item {
  border-top: 1px solid var(--glass-border-subtle);
}

.item-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}

.info .name {
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text-secondary);
}

.code {
  font-size: 1.35rem;
  font-weight: 700;
  font-family: "SF Mono", "Fira Code", monospace;
  letter-spacing: 3px;
  color: var(--success);
}

.timer-row {
  display: flex;
  align-items: center;
  gap: 6px;
}

.timer-track {
  flex: 1;
  height: 3px;
  background: rgba(100,116,139,0.14);
  border-radius: 2px;
  overflow: hidden;
  box-shadow: inset 0 1px 1px rgba(15,23,42,0.06);
}

.timer-bar {
  width: 100%;
  height: 100%;
  border-radius: 2px;
  transform-origin: left center;
  will-change: transform;
  background: linear-gradient(90deg, var(--primary), #4096ff);
}
.timer-bar.warning { background: linear-gradient(90deg, var(--warning), #fbbf24); }
.timer-bar.danger { background: linear-gradient(90deg, var(--danger), #fb7185); }

.timer-text {
  font-size: 0.62rem;
  color: var(--text-secondary);
  min-width: 22px;
  text-align: right;
}

.footer {
  padding: 10px 16px;
  text-align: center;
  border-top: 1px solid var(--glass-border-subtle);
  background: var(--glass-bg-soft);
  box-shadow: var(--glass-highlight);
}

.footer button {
  background: rgba(255,255,255,0.42);
  border: 1px solid var(--glass-border-subtle);
  font-size: 0.82rem;
  color: var(--primary);
  font-weight: 500;
  cursor: pointer;
  padding: 6px 14px;
  border-radius: 8px;
  transition: background 0.15s, box-shadow 0.15s;
  box-shadow: var(--glass-highlight);
}

.footer button:hover {
  background: rgba(255,255,255,0.68);
  box-shadow: 0 8px 18px rgba(22,119,255,0.12), var(--glass-highlight);
}

.empty-state {
  padding: 30px 16px;
  text-align: center;
  color: var(--text-secondary);
  font-size: 0.85rem;
}
</style>
</head>
<body>
  <div class="popup">
    <div class="items" id="items"></div>
    <div class="footer">
      <button id="open-main" type="button">打开主窗口</button>
    </div>
  </div>

  <script type="module" src="/src/popup.js"></script>
</body>
</html>
