<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>2FA Codes</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
}

.popup {
  height: 100%;
  background: #ffffff;
  display: flex;
  flex-direction: column;
}

.items {
  flex: 1;
  overflow-y: auto;
}

.item {
  padding: 12px 16px;
}

.item + .item {
  border-top: 1px solid #f0f0f0;
}

.item-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}

.info .name {
  font-size: 0.82rem;
  font-weight: 500;
  color: #595959;
}

.code {
  font-size: 1.35rem;
  font-weight: 700;
  font-family: "SF Mono", "Fira Code", monospace;
  letter-spacing: 3px;
  color: #22c55e;
}

.timer-row {
  display: flex;
  align-items: center;
  gap: 6px;
}

.timer-track {
  flex: 1;
  height: 3px;
  background: #f0f0f0;
  border-radius: 2px;
  overflow: hidden;
}

.timer-bar {
  height: 100%;
  border-radius: 2px;
  transition: width 1s linear;
  background: linear-gradient(90deg, #1677ff, #4096ff);
}
.timer-bar.warning { background: linear-gradient(90deg, #faad14, #ffc53d); }
.timer-bar.danger { background: linear-gradient(90deg, #ff4d4f, #ff7875); }

.timer-text {
  font-size: 0.62rem;
  color: #8c8c8c;
  min-width: 22px;
  text-align: right;
}

.footer {
  padding: 10px 16px;
  text-align: center;
  border-top: 1px solid #f0f0f0;
}

.footer button {
  background: none;
  border: none;
  font-size: 0.82rem;
  color: #1677ff;
  font-weight: 500;
  cursor: pointer;
  padding: 6px 14px;
  border-radius: 8px;
  transition: background 0.15s;
}

.footer button:hover {
  background: rgba(22,119,255,0.06);
}

.empty-state {
  padding: 30px 16px;
  text-align: center;
  color: #bfbfbf;
  font-size: 0.85rem;
}
</style>
</head>
<body>
  <div class="popup">
    <div class="items" id="items"></div>
    <div class="footer">
      <button onclick="openMain()">打开主窗口</button>
    </div>
  </div>

  <script>
    let timer = null;
    const container = document.getElementById('items');

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function barClass(remaining) {
      const pct = (remaining / 30) * 100;
      if (pct < 20) return 'danger';
      if (pct < 40) return 'warning';
      return '';
    }

    function barWidth(remaining) {
      return ((remaining / 30) * 100) + '%';
    }

    async function update() {
      try {
        const codes = await window.api.getTopCodes();
        if (!codes || codes.length === 0) {
          container.innerHTML = '<div class="empty-state">暂无密钥</div>';
          return;
        }
        container.innerHTML = codes.map(c => `
          <div class="item">
            <div class="item-row">
              <div class="info"><span class="name">${escapeHtml(c.name)}</span></div>
              <span class="code">${c.current}</span>
            </div>
            <div class="timer-row">
              <div class="timer-track">
                <div class="timer-bar ${barClass(c.remaining)}" style="width:${barWidth(c.remaining)}"></div>
              </div>
              <span class="timer-text">${c.remaining}s</span>
            </div>
          </div>
        `).join('');
      } catch (e) {
        container.innerHTML = '<div class="empty-state">加载失败</div>';
      }
    }

    async function openMain() {
      try { await window.api.openMain(); } catch (_) {}
    }

    update();
    timer = setInterval(update, 1000);
  </script>
</body>
</html>
